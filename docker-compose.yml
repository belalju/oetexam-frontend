services:
  oetexam-frontend:
    image: ghcr.io/belalju/oetexam-frontend:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: oetexam-frontend
    ports:
      # localhost-only: reachable just by the host nginx on port 80, not from outside
      - "127.0.0.1:8081:80"
    restart: unless-stopped
