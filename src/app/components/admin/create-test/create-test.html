<!-- ========== PAGE 8: ADMIN TEST BUILDER (Wizard) ========== -->
<div id="admin-test-builder" class="page pt-8">
  <div class="flex min-h-screen">

    <main class="flex-1 p-6 bg-slate-50">
      <div class="mb-6">
        <button onclick="showPage('admin-dashboard')" class="text-xs text-slate-400 hover:text-slate-600 mb-2 flex items-center gap-1"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>Back to Dashboard</button>
        <h1 class="font-display text-2xl font-bold text-navy-900">Create New Test</h1>
        <p class="text-slate-500 text-sm mt-1">Complete all steps to build and publish your test</p>
      </div>

      <!-- Wizard Steps -->
      <div class="flex items-center mb-8">
        <div class="flex flex-col items-center">
          <div class="w-8 h-8 rounded-full step-complete bg-[#1a5cff] text-white text-xs font-bold flex items-center justify-center">✓</div>
          <span class="text-xs font-semibold text-teal-600 mt-1">Test Info</span>
        </div>
        <div class="step-line flex-1 h-1 bg-[#1a5cff]  done mx-2"></div>
        <div class="flex flex-col items-center">
          <div class="w-8 h-8 rounded-full step-active bg-white border-2 border-[#1a5cff] text-[#1a5cff] text-xs font-bold flex items-center justify-center">2</div>
          <span class="text-xs font-semibold text-[#1a5cff] mt-1">Parts</span>
        </div>
        <div class="step-line flex-1 h-1 bg-[#e2e8f0] mx-2"></div>
        <div class="flex flex-col items-center">
          <div class="w-8 h-8 rounded-full step-pending bg-slate-200 text-xs font-bold flex items-center justify-center">3</div>
          <span class="text-xs text-slate-400 mt-1">Passages</span>
        </div>
        <div class="step-line flex-1 h-1 bg-[#e2e8f0] mx-2"></div>
        <div class="flex flex-col items-center">
          <div class="w-8 h-8 rounded-full step-pending bg-slate-200 text-xs font-bold flex items-center justify-center">4</div>
          <span class="text-xs text-slate-400 mt-1">Questions</span>
        </div>
        <div class="step-line flex-1 h-1 bg-[#e2e8f0] mx-2"></div>
        <div class="flex flex-col items-center">
          <div class="w-8 h-8 rounded-full step-pending bg-slate-200 text-xs font-bold flex items-center justify-center">5</div>
          <span class="text-xs text-slate-400 mt-1">Review</span>
        </div>
      </div>

      <!-- Step 2: Parts -->
      <div class="max-w-2xl">
        <div class="bg-white rounded-2xl border border-slate-100 p-6 mb-4">
          <h2 class="font-semibold text-navy-900 mb-4">Test Details</h2>
          <div class="grid grid-cols-2 gap-4 mb-4">
            <div>
              <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Title</label>
              <input type="text" value="Sample Test 5" class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500">
            </div>
            <div>
              <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Sub-Test Type</label>
              <select class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500">
                <option selected>Reading</option><option>Listening</option>
              </select>
            </div>
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Description (optional)</label>
            <textarea class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500 h-20 resize-none" placeholder="Brief description of this test..."></textarea>
          </div>
        </div>

        <!-- Parts Config -->
        <div class="bg-white rounded-2xl border border-slate-100 p-6 mb-4">
          <h2 class="font-semibold text-navy-900 mb-4">Configure Parts</h2>
          <div class="space-y-3">
            <div class="border border-slate-200 rounded-xl p-4 bg-teal-50/30">
              <div class="flex items-center justify-between mb-3">
                <div class="flex items-center gap-2">
                  <span class="w-7 h-7 bg-teal-600 text-white text-xs font-bold rounded-lg flex items-center justify-center">A</span>
                  <span class="font-semibold text-slate-800 text-sm">Part A</span>
                  <span class="text-xs text-slate-400">· Expedited Reading / Note Completion</span>
                </div>
                <span class="badge-published text-xs px-2 py-0.5 rounded-full font-medium">Configured</span>
              </div>
              <div class="grid grid-cols-3 gap-3">
                <div>
                  <label class="block text-xs text-slate-400 mb-1">Time Limit (min)</label>
                  <input type="number" value="15" class="w-full border border-slate-200 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500">
                </div>
                <div>
                  <label class="block text-xs text-slate-400 mb-1">No. of Questions</label>
                  <input type="number" value="20" class="w-full border border-slate-200 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500">
                </div>
                <div>
                  <label class="block text-xs text-slate-400 mb-1">Texts / Passages</label>
                  <input type="number" value="4" class="w-full border border-slate-200 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500">
                </div>
              </div>
            </div>

            <div class="border border-slate-200 rounded-xl p-4">
              <div class="flex items-center justify-between mb-3">
                <div class="flex items-center gap-2">
                  <span class="w-7 h-7 bg-slate-200 text-slate-600 text-xs font-bold rounded-lg flex items-center justify-center">B</span>
                  <span class="font-semibold text-slate-800 text-sm">Part B</span>
                  <span class="text-xs text-slate-400">· Short Passages + MCQ</span>
                </div>
                <span class="badge-draft text-xs px-2 py-0.5 rounded-full font-medium">Pending</span>
              </div>
              <div class="grid grid-cols-3 gap-3">
                <div>
                  <label class="block text-xs text-slate-400 mb-1">Time Limit (min)</label>
                  <input type="number" value="15" class="w-full border border-slate-200 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500">
                </div>
                <div>
                  <label class="block text-xs text-slate-400 mb-1">No. of Questions</label>
                  <input type="number" value="6" class="w-full border border-slate-200 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500">
                </div>
                <div>
                  <label class="block text-xs text-slate-400 mb-1">Passages</label>
                  <input type="number" value="6" class="w-full border border-slate-200 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500">
                </div>
              </div>
            </div>

            <div class="border border-slate-200 rounded-xl p-4">
              <div class="flex items-center justify-between mb-3">
                <div class="flex items-center gap-2">
                  <span class="w-7 h-7 bg-slate-200 text-slate-600 text-xs font-bold rounded-lg flex items-center justify-center">C</span>
                  <span class="font-semibold text-slate-800 text-sm">Part C</span>
                  <span class="text-xs text-slate-400">· Long Passages + MCQ</span>
                </div>
                <span class="badge-draft text-xs px-2 py-0.5 rounded-full font-medium">Pending</span>
              </div>
              <div class="grid grid-cols-3 gap-3">
                <div>
                  <label class="block text-xs text-slate-400 mb-1">Time Limit (min)</label>
                  <input type="number" value="30" class="w-full border border-slate-200 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500">
                </div>
                <div>
                  <label class="block text-xs text-slate-400 mb-1">No. of Questions</label>
                  <input type="number" value="16" class="w-full border border-slate-200 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500">
                </div>
                <div>
                  <label class="block text-xs text-slate-400 mb-1">Texts</label>
                  <input type="number" value="2" class="w-full border border-slate-200 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500">
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="flex justify-between">
          <button class="border border-slate-200 text-slate-600 text-sm font-medium px-5 py-2.5 rounded-xl hover:bg-slate-50 transition">← Previous</button>
          <button onclick="showPage('admin-question-editor')" class="bg-teal-600 hover:bg-teal-700 text-white text-sm font-semibold px-6 py-2.5 rounded-xl transition">Continue to Passages →</button>
        </div>
      </div>
    </main>
  </div>
</div>
