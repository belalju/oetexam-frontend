 
    <!-- Header Row -->
    <div class="flex items-start justify-between mb-8">
      <div>
        <h1 class="text-2xl font-bold text-gray-900">Test Catalog</h1>
        <p class="text-sm text-gray-500 mt-1">Choose a practice test to begin</p>
      </div>
      <div class="flex items-center gap-3">
        <div class="relative">
          <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <input type="text" placeholder="Search tests..."
            class="pl-9 pr-4 py-2 text-sm bg-white border border-gray-200 rounded-lg text-gray-600 placeholder-gray-400 focus:outline-none w-56 shadow-sm"/>
        </div>
        <select class="text-sm bg-white border border-gray-200 rounded-lg px-3 py-2 text-gray-700 focus:outline-none shadow-sm cursor-pointer">
          <option>All Types</option>
          <option>Reading</option>
          <option>Listening</option>
        </select>
      </div>
    </div>
 
    <!-- Filter Tabs -->
    <div class="flex items-center gap-1 mb-6">
      <button class="px-4 py-1.5 text-sm font-semibold rounded-md bg-white text-gray-800 shadow-sm border border-gray-200">All</button>
      <button class="px-4 py-1.5 text-sm font-medium rounded-md text-gray-500 hover:bg-white hover:text-gray-700 transition">Not Started</button>
      <button class="px-4 py-1.5 text-sm font-medium rounded-md text-gray-500 hover:bg-white hover:text-gray-700 transition">Completed</button>
    </div>
 
    <!-- Cards Grid -->
    <div class="grid grid-cols-3 gap-5">
 
      <!-- Card 1: Sample Test 4 - Reading - Not attempted -->
      @for(item of tests(); track item.id){
      <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 flex flex-col justify-between">
        <div>
          <div class="flex items-start justify-between mb-4">
            <div class="w-10 h-10 rounded-xl bg-blue-50 flex items-center justify-center">
              <svg class="w-5 h-5 text-blue-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
              </svg>
            </div>
            <span class="text-xs font-semibold px-3 py-1 rounded-full bg-blue-50 text-blue-500">{{item.subTestType}}</span>
          </div>
          <h2 class="text-base font-bold text-gray-900">{{item.title}}</h2>
          <p class="text-xs text-gray-400 mt-1">Parts A, B &amp; C · 42 questions · 60 min</p>
        </div>
        <div class="flex items-center justify-between mt-6">
          <span class="text-xs text-gray-400">Not attempted</span>
          <button (click)="startTest(item.id)" class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold px-5 py-2 rounded-lg transition">Start Test</button>
        </div>
      </div>
      }
