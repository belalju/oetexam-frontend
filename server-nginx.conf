# Single nginx config for the SERVER (host) nginx on port 80.
# Routes both apps:
#   /     -> frontend container (127.0.0.1:8081)
#   /api  -> backend container  (127.0.0.1:8088)
#
# Install once on the server:
#   sudo cp server-nginx.conf /etc/nginx/sites-available/oetexam
#   sudo ln -s /etc/nginx/sites-available/oetexam /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name _;

    # Frontend (Angular app served by the frontend container)
    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend API (Spring Boot container)
    location /api {
        proxy_pass http://127.0.0.1:8088;
        proxy_http_version 1.1;
        client_max_body_size 100m;   # nginx default is 1m — audio uploads need more
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
